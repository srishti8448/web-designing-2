<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Lab</title>
    <link rel="stylesheet" href="exp3.css">
    <script src="exp3.js"></script>
</head>
<body>

<div class="container">
    <h1 id="heading">Welcome to JavaScript Lab</h1>

    <input type="text" id="inputText" placeholder="Enter new heading text">

    <div class="buttons">
        <button onclick="changeHeading()">Change Heading</button>
        <button onclick="changeBackground()">Change Background</button>
        <button onclick="increaseFont()">Increase Font Size</button>
    </div>

    <div class="buttons">
        <button onclick="toggleParagraph()">Show/Hide Paragraph</button>
        <button onclick="resetPage()">Reset</button>
    </div>

    <p id="para">
        This is a sample paragraph. JavaScript events can dynamically change content.
    </p>
</div>

<script src="exp3.js"></script>

</body>
</html>
